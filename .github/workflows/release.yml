name: GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release asset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update version in plugin file
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          sed -i "s/Version:     [0-9.]\+/Version:     $version/" preloader-plugin.php
          sed -i "s/define( 'LP_VERSION',  '[0-9.]\+'/define( 'LP_VERSION',  '$version'/" preloader-plugin.php

      - name: Commit version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preloader-plugin.php
          git commit -m "chore: update version to ${GITHUB_REF#refs/tags/v}"
          git push

      - name: Create release ZIP
        run: |
          version="${GITHUB_REF#refs/tags/}"
          mkdir -p release
          zip -r "release/wp-preloader-${version}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "release/*" \
            -x "node_modules/*"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: release/wp-preloader-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
